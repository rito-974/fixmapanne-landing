<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Ma Panne — Bientôt en ligne</title>
  <meta name="description" content="Fix Ma Panne — Diagnostic et réparation d'électroménager. Site en construction, ouverture prochaine.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 20px;
      font-weight: 800;
    }
    .tagline {
      font-size: clamp(1rem, 3vw, 1.3rem);
      margin-bottom: 40px;
      opacity: 0.9;
    }
    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1rem;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
    }
    .description {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.85;
    }
    .footer {
      margin-top: 40px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">🛠️ Site en construction</div>
    <h1>Fix Ma Panne</h1>
    <p class="tagline">Diagnostic et réparation d'électroménager</p>
    <p class="description">
      Notre nouveau site arrive très bientôt. Il vous aidera à diagnostiquer
      les pannes de vos appareils électroménagers et à trouver les bonnes pièces de rechange.
    </p>
    <p class="footer">© 2026 LDED — La Réunion 🌴</p>
  </div>
</body>
</html>
